name: Convert showcase issue to discussion

on:
  issues:
    types: [opened]

permissions:
  issues: write
  discussions: write

jobs:
  convert:
    if: contains(github.event.issue.labels.*.name, 'showcase')
    runs-on: ubuntu-latest
    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}
          repositories: |
            operations
            preliminary-stages

      - name: Check team membership
        id: perm
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          AUTHOR: ${{ github.event.issue.user.login }}
          ORG: ${{ github.repository_owner }}
        run: |
          allowed=false
          for team in admin operations candidates; do
            state=$(gh api "orgs/$ORG/teams/$team/memberships/$AUTHOR" --jq '.state' 2>/dev/null || echo "")
            if [ "$state" = "active" ]; then
              allowed=true
              echo "Author '$AUTHOR' is a member of @$ORG/$team."
              break
            fi
          done
          echo "allowed=$allowed" >> "$GITHUB_OUTPUT"

      - name: Reject non-member author
        if: steps.perm.outputs.allowed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          gh issue comment "$ISSUE_URL" --body "바이브 벤처 프로젝트 참가자가 아닙니다."
          gh issue close "$ISSUE_URL" --reason "not planned"

      - name: Validate issue body
        id: validate
        if: steps.perm.outputs.allowed == 'true'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python3 <<'PY'
          import os, re
          from urllib.parse import urlparse

          body = os.environ.get("ISSUE_BODY", "") or ""
          sections = re.split(r'(?m)^###\s+', body)
          fields = {}
          for section in sections[1:]:
              head, _, rest = section.partition('\n')
              fields[head.strip()] = rest.strip()

          def get(prefix):
              for label, value in fields.items():
                  if label.startswith(prefix):
                      return value.strip()
              return ''

          errors = []

          url = get('애플리케이션 링크')
          if url and '://' not in url:
              url = 'https://' + url
          azure_suffixes = (
              '.azurewebsites.net',
              '.azurecontainerapps.io',
              '.azurestaticapps.net',
              '.azure-api.net',
              '.cloudapp.azure.com',
              '.azurefd.net',
              '.azureedge.net',
              '.web.core.windows.net',
              '.azurecontainer.io',
              '.trafficmanager.net',
          )
          try:
              parsed = urlparse(url)
              scheme = (parsed.scheme or '').lower()
              host = (parsed.hostname or '').lower()
          except Exception:
              scheme, host = '', ''
          if scheme != 'https':
              errors.append('앱 배포 링크는 반드시 https:// 로 시작해야 합니다.')
          elif not host or not host.endswith(azure_suffixes):
              errors.append('앱 배포 링크는 반드시 Azure 클라우드에 있어야 합니다.')

          school = get('애플리케이션 개발자 학교')
          school_valid = school.endswith(('초등학교', '중학교', '고등학교'))
          if not school_valid:
              errors.append("학교명은 반드시 '초등학교', '중학교' 또는 '고등학교'로 끝나야 합니다.")

          grade_str = get('애플리케이션 개발자 학년')
          if school_valid:
              max_grade = 6 if school.endswith('초등학교') else 3
              if not grade_str.isdigit() or not 1 <= int(grade_str) <= max_grade:
                  errors.append(f'학년은 반드시 1-{max_grade} 사이의 숫자여야 합니다.')

          class_str = get('애플리케이션 개발자 학반')
          if not class_str.isdigit() or not 1 <= int(class_str) <= 9:
              errors.append('학반은 반드시 1-9 사이의 숫자여야 합니다.')

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as f:
              if errors:
                  f.write('valid=false\n')
                  f.write('comment<<__EOF__\n')
                  f.write('다음 항목을 확인해 주세요.\n\n')
                  for e in errors:
                      f.write(f'- {e}\n')
                  f.write('__EOF__\n')
              else:
                  f.write('valid=true\n')
          PY

      - name: Reject invalid submission
        if: steps.validate.outputs.valid == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          COMMENT: ${{ steps.validate.outputs.comment }}
        run: |
          gh issue comment "$ISSUE_URL" --body "$COMMENT"
          gh issue close "$ISSUE_URL" --reason "not planned"

      - name: Look up discussion category ID
        id: cat
        if: steps.validate.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          CATEGORY_SLUG: '01-내가-만든-앱-자랑하기'
        run: |
          id=$(gh api graphql \
            -F owner="$OWNER" \
            -F name="$REPO" \
            -F slug="$CATEGORY_SLUG" \
            -f query='
              query($owner: String!, $name: String!, $slug: String!) {
                repository(owner: $owner, name: $name) {
                  discussionCategory(slug: $slug) { id }
                }
              }' \
            --jq '.data.repository.discussionCategory.id')
          if [ -z "$id" ] || [ "$id" = "null" ]; then
            echo "::error::Discussion category '$CATEGORY_SLUG' not found."
            exit 1
          fi
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - name: Convert issue to discussion
        if: steps.validate.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_ID: ${{ github.event.issue.node_id }}
          CATEGORY_ID: ${{ steps.cat.outputs.id }}
        run: |
          gh api graphql \
            -f query='
              mutation($issueId: ID!, $categoryId: ID!) {
                convertIssueToDiscussion(input: {issueId: $issueId, categoryId: $categoryId}) {
                  discussion { url }
                }
              }' \
            -f issueId="$ISSUE_ID" \
            -F categoryId="$CATEGORY_ID"
