name: 내가 만든 앱 자랑하기
description: 직접 만든 앱을 다른 친구들에게 소개해 주세요.
title: "[자랑] "
labels: ["showcase"]
body:
  - type: markdown
    attributes:
      value: |
        아래 항목을 모두 채워 주세요. 제출된 내용은 디스커션 게시글로 자동 변환됩니다.

  - type: input
    id: app-name
    attributes:
      label: 내가 만든 앱 이름
      placeholder: 예) 우리 학교 급식 알리미
    validations:
      required: true

  - type: input
    id: app-url
    attributes:
      label: 애플리케이션 링크
      description: 앱을 실행해 볼 수 있는 URL을 입력해 주세요.
      placeholder: https://example.com
    validations:
      required: true

  - type: textarea
    id: app-description
    attributes:
      label: 애플리케이션 소개
      description: 어떤 앱인지, 어떤 기능이 있는지 자유롭게 소개해 주세요.
      placeholder: 이 앱은 ...
    validations:
      required: true

  - type: input
    id: developer-name
    attributes:
      label: 애플리케이션 개발자 이름
      placeholder: 예) 김개발
    validations:
      required: true

  - type: input
    id: developer-school
    attributes:
      label: 애플리케이션 개발자 학교
      placeholder: 예) 신당중학교
    validations:
      required: true

  - type: input
    id: developer-grade
    attributes:
      label: 애플리케이션 개발자 학년 (숫자만 입력)
      placeholder: 예) 2
    validations:
      required: true

  - type: input
    id: developer-class
    attributes:
      label: 애플리케이션 개발자 학반 (숫자만 입력)
      placeholder: 예) 1
    validations:
      required: true
