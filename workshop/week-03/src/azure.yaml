# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: vibe-venture-week03
metadata:
  template: vibe-venture-week03@1.0.0

services:
  api:
    project: ./api
    host: containerapp
    language: python
    docker:
      path: Dockerfile
      context: .
      remoteBuild: true

  web:
    project: ./web
    host: containerapp
    language: ts
    docker:
      path: Dockerfile
      context: .
      remoteBuild: true

hooks:
  preprovision:
    posix:
      shell: sh
      continueOnError: false
      interactive: true
      run: |
        set -e
        if [ -z "${NEIS_API_KEY:-}" ]; then
          echo "ERROR: NEIS_API_KEY is not set in the azd environment." >&2
          echo "Run:  azd env set NEIS_API_KEY <your-key>"             >&2
          exit 1
        fi
    windows:
      shell: pwsh
      continueOnError: false
      interactive: true
      run: |
        if ([string]::IsNullOrWhiteSpace($env:NEIS_API_KEY)) {
          Write-Error "NEIS_API_KEY is not set in the azd environment."
          Write-Host  "Run:  azd env set NEIS_API_KEY <your-key>"
          exit 1
        }
