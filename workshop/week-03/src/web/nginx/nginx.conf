# Hardened, minimal nginx main config for the SPA runtime image.
#
# - server_tokens off: do not advertise nginx version in error pages or
#   the Server header.
# - Sane worker / event defaults for a small static-serving container.
# - Logs to stdout/stderr so Docker / Container Apps can collect them.
# - The actual server block lives in /etc/nginx/conf.d/default.conf,
#   produced from /etc/nginx/templates/default.conf.template at startup.

worker_processes auto;
pid /tmp/nginx.pid;

error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version from error pages and the Server header.
    server_tokens off;

    # Use writable temp paths under /tmp so the container can run with a
    # read-only root filesystem.
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 30s;

    # Compress text-like assets. Static images / fonts are already
    # compressed and excluded.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Combined log format on stdout for the orchestrator.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /dev/stdout main;

    include /etc/nginx/conf.d/*.conf;
}
